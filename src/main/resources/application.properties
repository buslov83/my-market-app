spring.application.name=my-market-app

# Database configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/marketdb
spring.datasource.username=market_user
spring.datasource.password=mysecretpassword

# JPA/Hibernate configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Catalog loader configuration
app.catalog.csv-path=data/products.csv
app.catalog.images-path=data/images
app.catalog.load-on-startup=true
