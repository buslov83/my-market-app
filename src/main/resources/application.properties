spring.application.name=my-market-app

# Database configuration
spring.r2dbc.url=r2dbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.r2dbc.username=${POSTGRES_USER}
spring.r2dbc.password=${POSTGRES_PASSWORD}

spring.sql.init.mode=always

# Catalog loader configuration
app.catalog.csv-path=data/products.csv
app.catalog.images-path=data/images
app.catalog.load-on-startup=true
