services:
  postgres:
    image: postgres:17.5
    environment:
      POSTGRES_DB: marketdb
      POSTGRES_USER: market_user
      POSTGRES_PASSWORD: mysecretpassword
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U market_user -d marketdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    image: my-market-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: marketdb
      POSTGRES_USER: market_user
      POSTGRES_PASSWORD: mysecretpassword
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data:ro

volumes:
  postgres_data: